name        = "Compute Metrics"
description = "Full binding-metrics suite on relaxed structures: interaction energy, interface (SASA, ΔG_int, H-bonds, salt bridges), geometry (Ramachandran, ω-planarity, shape complementarity, void volume), Coulomb electrostatics, and pre/post RMSD. Outputs one *_results.json per structure."
inputs      = ["cleaned_*.cif", "cleaned_*.pdb", "*_minimized.cif", "*_md_final.cif"]
outputs     = ["*_results.json"]

[container]
image = "simoncrouzet/binding-metrics:latest"

[scripts]
run = "./run.sh"

[params.DEVICE]
type         = "enum"
default      = "cuda"
hint         = "OpenMM compute device"
enum_values  = ["cpu", "cuda"]

[params.PEPTIDE_CHAIN]
type    = "string"
default = ""
hint    = "Peptide chain ID (empty = auto)"

[params.RECEPTOR_CHAIN]
type    = "string"
default = ""
hint    = "Receptor chain ID (empty = auto)"
